services:
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    image: network-scan-cli:latest
    container_name: network-scan-cli
    # naabu host discovery / SYN scans need raw socket capabilities.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    # Prevent a large /16 NSE fan-out from exhausting the host.
    mem_limit: 4g
    cpus: "4.0"
    ulimits:
      nproc: 512
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./scanner/inputs:/app/scanner/inputs
      - ./scanner/config:/app/scanner/config
      - ./scanner/output:/app/scanner/output
      - ./scanner/state:/app/scanner/state
    command: ["--config", "scanner/config/default.yaml", "--mode", "balanced"]
