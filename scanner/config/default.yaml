runtime:
  mode: balanced
  output_dir: scanner/output
  state_dir: scanner/state
  logs_dir: scanner/output/logs
  retries: 2
  timeout_seconds: 1800
  keep_intermediate: true

profiles:
  safe:
    discover_rate: 1000
    port_rate: 1000
    top_ports: 100
    nmap_timing: T3
    nse_profile: baseline
  balanced:
    discover_rate: 3000
    port_rate: 3000
    top_ports: 1000
    nmap_timing: T4
    nse_profile: baseline
  fast:
    discover_rate: 7000
    port_rate: 7000
    top_ports: 1000
    nmap_timing: T4
    nse_profile: baseline

discovery:
  source: naabu
  skip_discovery: false

ports:
  source: naabu
  custom_ports_file: scanner/inputs/ports.txt

nse_profiles:
  baseline:
    scripts: "default,safe"
    version_detection: true
  service_specific:
    scripts: "http-*,ssl-cert,smb-*,ssh-*,dns-*"
    version_detection: true

reporting:
  markdown_summary: true
  html_summary: true
  csv_export: true
  json_export: true
