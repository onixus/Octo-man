runtime:
  mode: balanced
  output_dir: scanner/output
  state_dir: scanner/state
  logs_dir: scanner/output/logs
  retries: 2
  timeout_seconds: 1800
  # Per-host nmap (NSE/OS) timeout, separate from the global command timeout.
  nse_timeout_seconds: 900
  # Default number of nmap processes run in parallel during the NSE/OS stage.
  nse_concurrency: 4
  # Global packets/sec budget for the NSE/OS stage, shared across all parallel
  # nmap processes (each gets nse_max_rate / nse_concurrency). 0 = unlimited.
  nse_max_rate: 0
  keep_intermediate: true

profiles:
  safe:
    discover_rate: 1000
    port_rate: 1000
    top_ports: 100
    nmap_timing: T3
    nse_profile: baseline
    nse_concurrency: 2
    nse_max_rate: 500
  balanced:
    discover_rate: 3000
    port_rate: 3000
    top_ports: 1000
    nmap_timing: T4
    nse_profile: vuln
    nse_concurrency: 4
    nse_max_rate: 2000
  fast:
    discover_rate: 7000
    port_rate: 7000
    top_ports: 1000
    nmap_timing: T4
    nse_profile: vuln
    nse_concurrency: 8
    nse_max_rate: 5000

discovery:
  source: naabu
  skip_discovery: false

ports:
  source: naabu
  custom_ports_file: scanner/inputs/ports.txt

nse_profiles:
  baseline:
    scripts: "default,safe"
    version_detection: true
    os_detection: true
  vuln:
    scripts: "default,safe,vuln"
    version_detection: true
    os_detection: true
  service_specific:
    scripts: "http-*,ssl-cert,smb-*,ssh-*,dns-*"
    version_detection: true
    os_detection: false

reporting:
  markdown_summary: true
  html_summary: true
  csv_export: true
  json_export: true
